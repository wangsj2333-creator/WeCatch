<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeCatch</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      width: 300px;
      background: #fff;
      color: #333;
    }

    /* Status bar */
    #status-bar {
      padding: 10px 14px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
      color: #555;
    }

    #status-bar.logged-in {
      background: #e8f5e9;
      color: #2e7d32;
    }

    /* Main content */
    .content {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Article list section */
    #article-section {
      display: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    #article-section-header {
      padding: 8px 12px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    #select-all-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    #article-list {
      max-height: 260px;
      overflow-y: auto;
    }

    #article-loading {
      padding: 14px 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    .article-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .article-item:last-child {
      border-bottom: none;
    }

    .article-item:hover {
      background: #fafafa;
    }

    .article-item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .article-item-text {
      flex: 1;
      min-width: 0;
    }

    .article-title {
      font-size: 13px;
      line-height: 1.4;
      color: #333;
      word-break: break-all;
    }

    .article-count {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }

    #btn-dashboard {
      background: #1976d2;
      color: #fff;
    }

    #btn-dashboard:hover {
      background: #1565c0;
    }

    #btn-capture {
      background: #388e3c;
      color: #fff;
    }

    #btn-capture:hover:not(:disabled) {
      background: #2e7d32;
    }

    #btn-capture:disabled {
      background: #bdbdbd;
      color: #fff;
      cursor: not-allowed;
    }

    /* Result area */
    #result-area {
      display: none;
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
    }

    #result-area.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    #result-area.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }
  </style>
</head>
<body>
  <div id="status-bar">未登录</div>

  <div class="content">
    <button id="btn-dashboard">Open Dashboard</button>

    <!-- Article selection section (shown only on WeChat MP pages) -->
    <div id="article-section">
      <div id="article-section-header">
        <label id="select-all-label">
          <input type="checkbox" id="chk-select-all" checked />
          全选
        </label>
        <span id="article-section-title" style="margin-left: auto; color: #888;">加载中…</span>
      </div>
      <div id="article-list">
        <div id="article-loading">正在加载文章列表…</div>
      </div>
    </div>

    <button id="btn-capture" disabled title="请在微信公众号后台使用">
      抓取选中文章
    </button>
    <div id="result-area"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
