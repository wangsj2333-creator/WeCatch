<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeCatch</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      width: 280px;
      background: #fff;
      color: #333;
    }

    /* Status bar */
    #status-bar {
      padding: 10px 14px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
      color: #555;
    }

    #status-bar.logged-in {
      background: #e8f5e9;
      color: #2e7d32;
    }

    /* Main content */
    .content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }

    #btn-dashboard {
      background: #1976d2;
      color: #fff;
    }

    #btn-dashboard:hover {
      background: #1565c0;
    }

    #btn-capture {
      background: #388e3c;
      color: #fff;
    }

    #btn-capture:hover:not(:disabled) {
      background: #2e7d32;
    }

    #btn-capture:disabled {
      background: #bdbdbd;
      color: #fff;
      cursor: not-allowed;
    }

    /* Result area */
    #result-area {
      display: none;
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
    }

    #result-area.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    #result-area.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }
  </style>
</head>
<body>
  <div id="status-bar">未登录</div>

  <div class="content">
    <button id="btn-dashboard">Open Dashboard</button>
    <button id="btn-capture" disabled title="请在微信公众号后台使用">
      Capture Comments
    </button>
    <div id="result-area"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
